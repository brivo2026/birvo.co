services:
  - type: web
    name: birvo-api
    runtime: node
    plan: starter
    region: oregon
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm turbo run build --filter=@birvo/api...
    startCommand: pnpm --filter @birvo/api start
    preDeployCommand: pnpm --filter @birvo/database migrate
    healthCheckPath: /v1/health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_NAME
        value: BIRVO
      - key: LOG_LEVEL
        value: info
      - key: API_HOST
        value: 0.0.0.0
      - key: API_BASE_URL
        value: https://birvo-api.onrender.com
      - key: WEB_BASE_URL
        value: https://birvo-web.onrender.com
      - key: CORS_ORIGINS
        value: https://birvo-web.onrender.com
      - key: SESSION_COOKIE_NAME
        value: birvo_session
      - key: SESSION_JWT_SECRET
        generateValue: true
      - key: SESSION_TTL_HOURS
        value: "12"
      - key: SESSION_REFRESH_TTL_DAYS
        value: "14"
      - key: CREDENTIALS_ENCRYPTION_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: birvo-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: STORAGE_DRIVER
        value: local
      - key: STORAGE_LOCAL_PATH
        value: ./storage/uploads
      - key: SMTP_HOST
        value: localhost
      - key: SANDBOX_CHANNEL_ENABLED
        value: "true"
      - key: AI_PROVIDER
        value: mock
      - key: TRANSCRIPTION_PROVIDER
        value: mock
      # Credenciales reales de Meta — se completan desde el dashboard de
      # Render cuando tengas la app creada en Meta for Developers.
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_CLOUD_API_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: INSTAGRAM_PAGE_TOKEN
        sync: false
      - key: MESSENGER_PAGE_TOKEN
        sync: false
    disk:
      name: birvo-api-storage
      mountPath: /opt/render/project/src/apps/api/storage
      sizeGB: 1

  - type: worker
    name: birvo-worker
    runtime: node
    plan: starter
    region: oregon
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm turbo run build --filter=@birvo/worker...
    startCommand: pnpm --filter @birvo/worker start
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: SESSION_JWT_SECRET
        generateValue: true
      - key: CREDENTIALS_ENCRYPTION_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: birvo-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: STORAGE_DRIVER
        value: local
      - key: AI_PROVIDER
        value: mock
      - key: TRANSCRIPTION_PROVIDER
        value: mock
      - key: WORKER_CONCURRENCY
        value: "5"
      - key: INACTIVITY_TIMER_DEFAULT_MINUTES
        value: "5"

  - type: web
    name: birvo-web
    runtime: node
    plan: starter
    region: oregon
    buildCommand: corepack enable && pnpm install --frozen-lockfile && NEXT_PUBLIC_API_URL=https://birvo-api.onrender.com pnpm turbo run build --filter=@birvo/web...
    startCommand: pnpm --filter @birvo/web start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://birvo-api.onrender.com

databases:
  - name: birvo-postgres
    plan: starter
    databaseName: birvo
    user: birvo
    region: oregon
