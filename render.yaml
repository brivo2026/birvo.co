services:
  - type: web
    name: birvo-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm turbo run build
    # preDeployCommand no está soportado en el plan free: la migración se
    # corre como parte del arranque en su lugar. `prisma migrate deploy` es
    # idempotente (solo aplica migraciones pendientes), así que es seguro
    # ejecutarla en cada arranque, incluido cada vez que el servicio
    # despierta tras dormirse por inactividad.
    startCommand: pnpm --filter @birvo/database migrate && pnpm --filter @birvo/api start
    healthCheckPath: /v1/health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_NAME
        value: BIRVO
      - key: LOG_LEVEL
        value: info
      - key: API_HOST
        value: 0.0.0.0
      - key: API_BASE_URL
        value: https://birvo-api.onrender.com
      - key: WEB_BASE_URL
        value: https://birvo-web.onrender.com
      - key: CORS_ORIGINS
        value: https://birvo-web.onrender.com
      - key: SESSION_COOKIE_NAME
        value: birvo_session
      - key: SESSION_JWT_SECRET
        generateValue: true
      - key: SESSION_TTL_HOURS
        value: "12"
      - key: SESSION_REFRESH_TTL_DAYS
        value: "14"
      - key: CREDENTIALS_ENCRYPTION_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: birvo-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: birvo-redis
          type: keyvalue
          property: connectionString
      - key: STORAGE_DRIVER
        value: local
      - key: STORAGE_LOCAL_PATH
        value: ./storage/uploads
      - key: SMTP_HOST
        value: localhost
      - key: SANDBOX_CHANNEL_ENABLED
        value: "true"
      - key: AI_PROVIDER
        value: mock
      - key: TRANSCRIPTION_PROVIDER
        value: mock
      # Credenciales reales de Meta — se completan desde el dashboard de
      # Render cuando tengas la app creada en Meta for Developers.
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_CLOUD_API_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: INSTAGRAM_PAGE_TOKEN
        sync: false
      - key: MESSENGER_PAGE_TOKEN
        sync: false
    # Sin disco persistente (no disponible en el plan free): los adjuntos
    # guardados en disco local se pierden en cada reinicio/redeploy. Para
    # persistirlos de verdad, subir birvo-api a un plan pago y volver a
    # agregar un bloque `disk:`, o cambiar STORAGE_DRIVER a "s3".

  - type: worker
    name: birvo-worker
    runtime: node
    plan: starter
    region: oregon
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm turbo run build
    startCommand: pnpm --filter @birvo/worker start
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: SESSION_JWT_SECRET
        generateValue: true
      - key: CREDENTIALS_ENCRYPTION_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: birvo-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: birvo-redis
          type: keyvalue
          property: connectionString
      - key: STORAGE_DRIVER
        value: local
      - key: AI_PROVIDER
        value: mock
      - key: TRANSCRIPTION_PROVIDER
        value: mock
      - key: WORKER_CONCURRENCY
        value: "5"
      - key: INACTIVITY_TIMER_DEFAULT_MINUTES
        value: "5"

  - type: web
    name: birvo-web
    runtime: node
    plan: free
    region: oregon
    buildCommand: corepack enable && pnpm install --frozen-lockfile && NEXT_PUBLIC_API_URL=https://birvo-api.onrender.com pnpm turbo run build
    startCommand: pnpm --filter @birvo/web start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://birvo-api.onrender.com

  - type: keyvalue
    name: birvo-redis
    plan: free
    region: oregon
    ipAllowList: []

databases:
  - name: birvo-postgres
    plan: free
    databaseName: birvo
    user: birvo
    region: oregon
