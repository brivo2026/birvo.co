name: birvo

services:
  postgres:
    image: postgres:18-alpine
    container_name: birvo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: birvo
      POSTGRES_PASSWORD: birvo_dev_password
      POSTGRES_DB: birvo
    ports:
      - "5432:5432"
    volumes:
      - birvo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U birvo -d birvo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: birvo-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - birvo_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: birvo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: birvo_minio
      MINIO_ROOT_PASSWORD: birvo_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - birvo_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: birvo-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 birvo_minio birvo_minio_password &&
      mc mb -p local/birvo-attachments &&
      mc anonymous set download local/birvo-attachments &&
      exit 0
      "

  mailpit:
    image: axllent/mailpit:latest
    container_name: birvo-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  birvo_postgres_data:
  birvo_redis_data:
  birvo_minio_data:
